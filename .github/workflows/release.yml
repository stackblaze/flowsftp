# Builds FlowSFTP for macOS (DMG), Windows (NSIS), and Linux (AppImage + deb)
# and publishes to a GitHub Release via electron-builder so that
# electron-updater can find latest.yml / latest-mac.yml / latest-linux.yml
# (+ blockmaps). Trigger by pushing a version tag:
#
#   git tag v1.0.1
#   git push origin v1.0.1
#
# Ensure package.json "version" matches the tag (without "v" prefix).
#
# macOS in-app updates: electron-updater downloads the ZIP, then Squirrel.Mac
# replaces the app only if the new build is signed with the same Developer ID
# as the running app. Unsigned CI builds → download works, install fails with a
# code signature error. Add repo secrets (see Pack & publish step) and use a
# paid Apple Developer account; see https://www.electron.build/code-signing

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (typecheck + electron-vite)
        run: npm run build

      # Use bash so mkdir -p / cp match Unix; PowerShell mkdir errors if build/ already exists (electron-vite creates it).
      - name: Prepare packaged-app icon
        shell: bash
        run: |
          mkdir -p build
          cp resources/icon.png build/icon.png

      # `--publish always` makes electron-builder upload artifacts AND
      # the latest.yml / latest-mac.yml / latest-linux.yml manifests +
      # .blockmap files to the GitHub Release for the pushed tag. The
      # first matrix job creates the (draft) release; the others attach
      # to it. GH_TOKEN is required for the github provider.
      - name: Pack & publish (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional — leave unset for unsigned builds. Required for macOS auto-update.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --${{ matrix.platform }} --publish always
