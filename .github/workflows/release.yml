# Builds FlowSFTP for macOS (DMG), Windows (NSIS), and Linux (AppImage + deb)
# and attaches artifacts to a GitHub Release. Trigger by pushing a version tag:
#
#   git tag v1.0.1
#   git push origin v1.0.1
#
# Ensure package.json "version" matches the tag (without "v" prefix).

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (typecheck + electron-vite)
        run: npm run build

      - name: Prepare packaged-app icon
        run: |
          mkdir -p build
          cp resources/icon.png build/icon.png

      - name: Pack (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flowsftp-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: flowsftp-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FlowSFTP ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
